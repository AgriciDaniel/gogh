<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc" font-family='"Google Sans","Product Sans",Roboto,"Segoe UI",Arial,sans-serif'>
<title id="title">Gogh frontispiece</title>
<desc id="desc">Soft tonal cover for Giving AI coding agents good taste in frontend design using the open-source Taste Skill framework by Leon Lin — an anti-slop SKILL.md ruleset with three design dials (DESIGN_VARIANCE, MOTION_INTENSITY, VISUAL_DENSITY), audit-first redesigns, an image-first reference pipeline, anti-laziness rules, and a strict pre-flight check that make Claude Code, Cursor, and Codex produce distinctive, non-templated interfaces instead of generic AI slop..</desc>
<style>
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  .fade{animation:fu .7s cubic-bezier(.2,.7,.2,1) backwards}
  .seg{animation:draw .6s ease backwards}
  .const{transform-origin:956px 190px;animation:spin 30s linear infinite}
  .node{transform-box:fill-box;transform-origin:center;animation:pop .5s cubic-bezier(.2,.8,.2,1) backwards,tw 3.4s ease-in-out infinite}
  @keyframes fu{from{opacity:0;transform:translateY(10px)}}
  @keyframes draw{from{stroke-dashoffset:70}}
  @keyframes pop{from{opacity:0;transform:scale(.3)}}
  @keyframes tw{0%,100%{opacity:1}50%{opacity:.65}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
