<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc" font-family='"Google Sans","Product Sans",Roboto,"Segoe UI",Arial,sans-serif'>
<title id="title">Taste Skill Brain relationship map</title>
<desc id="desc">Source to memory to gated deliverable.</desc>
<style>
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  .head,.chip,.arrow{animation:fu .55s ease backwards}
  @keyframes fu{from{opacity:0;transform:translateY(10px)}}
</style>
<rect width="1200" height="320" fill="#fff"/>
<rect x="10" y="10" width="1180" height="300" rx="26" fill="#fff" stroke="#E8EAED"/>
<text class="head" x="50" y="70" font-size="22" font-weight="800" fill="#202124">How Taste Skill Brain works</text><text class="head" style="animation-delay:0.08s" x="50" y="96" font-size="14" fill="#5F6368">Raw evidence becomes linked memory, checked gates, and deliverables for Giving AI coding agents</text><text class="head" style="animation-delay:0.12s" x="50" y="116" font-size="14" fill="#5F6368">good taste in frontend design using the open-source Taste Skill framework by Leon Lin — an</text><g class="chip" style="animation-delay:0.30s"><rect x="50" y="166" width="250" height="96" rx="16" fill="#fff" stroke="#E8EAED"/><rect x="50" y="166" width="7" height="96" rx="3.5" fill="#1A73E8"/><circle cx="84" cy="200" r="9" fill="#1A73E8"/><text x="106" y="206" font-size="18" font-weight="800" fill="#202124">Raw sources</text><text x="74" y="236" font-size="13" fill="#5F6368">immutable .raw inputs</text></g><g class="chip" style="animation-delay:0.46s"><rect x="350" y="166" width="250" height="96" rx="16" fill="#fff" stroke="#E8EAED"/><rect x="350" y="166" width="7" height="96" rx="3.5" fill="#D93025"/><circle cx="384" cy="200" r="9" fill="#D93025"/><text x="406" y="206" font-size="18" font-weight="800" fill="#202124">Linked wiki memory</text><text x="374" y="236" font-size="13" fill="#5F6368">notes, links, canon</text></g><g class="chip" style="animation-delay:0.62s"><rect x="650" y="166" width="250" height="96" rx="16" fill="#fff" stroke="#E8EAED"/><rect x="650" y="166" width="7" height="96" rx="3.5" fill="#F9AB00"/><circle cx="684" cy="200" r="9" fill="#F9AB00"/><text x="706" y="206" font-size="18" font-weight="800" fill="#202124">Checks and gates</text><text x="674" y="236" font-size="13" fill="#5F6368">audit, sources, confidence</text></g><g class="chip" style="animation-delay:0.78s"><rect x="950" y="166" width="250" height="96" rx="16" fill="#fff" stroke="#E8EAED"/><rect x="950" y="166" width="7" height="96" rx="3.5" fill="#1E8E3E"/><circle cx="984" cy="200" r="9" fill="#1E8E3E"/><text x="1006" y="206" font-size="18" font-weight="800" fill="#202124">Reports and deliverables</text><text x="974" y="236" font-size="13" fill="#5F6368">read only outputs</text></g><g class="arrow" style="animation-delay:0.50s"><line x1="310" y1="214" x2="338" y2="214" stroke="#5F6368" stroke-width="3" stroke-linecap="round"/><path d="M334,208 L342,214 L334,220" fill="none" stroke="#5F6368" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g><g class="arrow" style="animation-delay:0.66s"><line x1="610" y1="214" x2="638" y2="214" stroke="#5F6368" stroke-width="3" stroke-linecap="round"/><path d="M634,208 L642,214 L634,220" fill="none" stroke="#5F6368" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g><g class="arrow" style="animation-delay:0.82s"><line x1="910" y1="214" x2="938" y2="214" stroke="#5F6368" stroke-width="3" stroke-linecap="round"/><path d="M934,208 L942,214 L934,220" fill="none" stroke="#5F6368" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
</svg>
