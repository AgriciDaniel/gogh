<text class="head" x="50" y="70" font-size="22" font-weight="800" fill="#202124">How Gogh works</text><text class="head" style="animation-delay:0.08s" x="50" y="96" font-size="14" fill="#5F6368">Source cited Obsidian operating brain that turns six frontend design skills into one advisable</text><text class="head" style="animation-delay:0.12s" x="50" y="116" font-size="14" fill="#5F6368">stack.</text><g class="chip" style="animation-delay:0.30s"><rect x="50" y="150" width="250" height="96" rx="16" fill="#fff" stroke="#E8EAED"/><rect x="50" y="150" width="7" height="96" rx="3.5" fill="#1A73E8"/><circle cx="84" cy="184" r="9" fill="#1A73E8"/><text x="106" y="190" font-size="18" font-weight="800" fill="#202124">Raw sources</text><text x="74" y="220" font-size="13" fill="#5F6368">immutable .raw inputs</text></g><g class="chip" style="animation-delay:0.46s"><rect x="350" y="150" width="250" height="96" rx="16" fill="#fff" stroke="#E8EAED"/><rect x="350" y="150" width="7" height="96" rx="3.5" fill="#D93025"/><circle cx="384" cy="184" r="9" fill="#D93025"/><text x="406" y="190" font-size="18" font-weight="800" fill="#202124">Linked wiki memory</text><text x="374" y="220" font-size="13" fill="#5F6368">notes, links, canon</text></g><g class="chip" style="animation-delay:0.62s"><rect x="650" y="150" width="250" height="96" rx="16" fill="#fff" stroke="#E8EAED"/><rect x="650" y="150" width="7" height="96" rx="3.5" fill="#F9AB00"/><circle cx="684" cy="184" r="9" fill="#F9AB00"/><text x="706" y="190" font-size="18" font-weight="800" fill="#202124">Checks and gates</text><text x="674" y="220" font-size="13" fill="#5F6368">audit, sources, confidence</text></g><g class="chip" style="animation-delay:0.78s"><rect x="950" y="150" width="250" height="96" rx="16" fill="#fff" stroke="#E8EAED"/><rect x="950" y="150" width="7" height="96" rx="3.5" fill="#1E8E3E"/><circle cx="984" cy="184" r="9" fill="#1E8E3E"/><text x="1006" y="190" font-size="18" font-weight="800" fill="#202124">Reports and deliverables</text><text x="974" y="220" font-size="13" fill="#5F6368">read only outputs</text></g><g class="arrow" style="animation-delay:0.50s"><line x1="310" y1="198" x2="338" y2="198" stroke="#5F6368" stroke-width="3" stroke-linecap="round"/><path d="M334,192 L342,198 L334,204" fill="none" stroke="#5F6368" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g><g class="arrow" style="animation-delay:0.66s"><line x1="610" y1="198" x2="638" y2="198" stroke="#5F6368" stroke-width="3" stroke-linecap="round"/><path d="M634,192 L642,198 L634,204" fill="none" stroke="#5F6368" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g><g class="arrow" style="animation-delay:0.82s"><line x1="910" y1="198" x2="938" y2="198" stroke="#5F6368" stroke-width="3" stroke-linecap="round"/><path d="M934,192 L942,198 L934,204" fill="none" stroke="#5F6368" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g><text class="metric" x="50" y="274" font-size="13" letter-spacing="2" font-weight="800" fill="#5F6368">READ FROM VAULT DATA</text><g class="metric" style="animation-delay:0.86s"><rect x="50" y="288" width="250" height="54" rx="16" fill="#D3E3FD" stroke="#E8EAED"/><circle cx="78" cy="315" r="7" fill="#1A73E8"/><text x="98" y="312" font-size="18" font-weight="800" fill="#0B57D0">27</text><text x="98" y="330" font-size="12" font-weight="700" fill="#0B57D0">source ledger entries</text></g><g class="metric" style="animation-delay:0.94s"><rect x="318" y="288" width="250" height="54" rx="16" fill="#FAD2CF" stroke="#E8EAED"/><circle cx="346" cy="315" r="7" fill="#D93025"/><text x="366" y="312" font-size="18" font-weight="800" fill="#C5221F">1</text><text x="366" y="330" font-size="12" font-weight="700" fill="#C5221F">concept notes</text></g><g class="metric" style="animation-delay:1.02s"><rect x="586" y="288" width="250" height="54" rx="16" fill="#FEEFC3" stroke="#E8EAED"/><circle cx="614" cy="315" r="7" fill="#F9AB00"/><text x="634" y="312" font-size="18" font-weight="800" fill="#976800">10</text><text x="634" y="330" font-size="12" font-weight="700" fill="#976800">canon entries</text></g>
